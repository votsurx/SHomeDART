name: shome
description: SHome v2.0 - Smart Home Control
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # DI
  get_it: ^8.0.3

  # Storage
  sqflite: ^2.4.1
  flutter_secure_storage: ^9.2.4

  # Logging
  talker: ^4.6.3
  talker_flutter: ^4.6.3

  # Utilities
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.5.1

  # UI
  flutter_animate: ^4.5.2
  tinytuya:
    path: lib/packages/tinytuya
  cryptography: ^2.9.0

  shared_preferences: ^2.2.2
  path: ^1.8.3
dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.4

  # Testing
  mockito: ^5.4.5

  # Linting
  flutter_lints: ^5.0.0

  # MQTT
  mqtt_client: ^10.0.0

  # Statistics
  fl_chart: ^0.68.0

  # Export\Import
  file_picker: ^8.0.0
  share_plus: ^10.0.1
  path_provider: ^2.1.0

  #
  permission_handler: ^11.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
